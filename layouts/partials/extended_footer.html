<!--

`layouts/partials/extended_footer.html` in your Hugo directory.

<footer class="footer" >
    <div class="footer__inner">
      {{ if $.Site.Copyright }}
        <div class="copyright copyright--user">
          <span>{{ $.Site.Copyright | safeHTML }}</span>
      {{ else }}
        <div class="copyright">
          <span>Copyright James Hub - {{ now.Year }}</span>
      {{ end }}
          <!--<span>:: Theme made by <a href="https://twitter.com/panr">panr</a></span>-->
          <span class="pagination-centered">:: <a href="/privacy-policy" target="_blank" rel="noopener noreferrer">Privacy Policy</a>   <a href="https://youtu.be/cd4-UnU8lWY?t=34" target="_blank" rel="noopener noreferrer">Sell My Personal Information?</a></span>
        </div>
    </div>
  </footer>
  
  <script src="{{ "assets/main.js" | absURL }}"></script>
  <script src="{{ "assets/prism.js" | absURL }}"></script>
  
  {{ if $.Site.Params.showLanguageSelector }}
    <script src="{{ "assets/languageSelector.js" | absURL }}"></script>
  {{ end }}
